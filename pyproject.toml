[tool.ruff]
line-length = 120
target-version = "py311"
# presentation/ is the document build toolchain: it carries its own quality
# gates (qa/), and legacy/ is kept verbatim by policy. The pipeline lint
# standard applies to pipeline code.
extend-exclude = [".venv", "presentation"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
