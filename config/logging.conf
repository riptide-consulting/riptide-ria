# logging configuration
[loggers]
keys=root,ria

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=detailed

[logger_root]
level=INFO
handlers=consoleHandler

[logger_ria]
level=INFO
handlers=consoleHandler,fileHandler
qualname=ria
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=detailed
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=detailed
args=('logs/ria.log', 'a')

[formatter_detailed]
format=%(asctime)s | %(name)s | %(levelname)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
