name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate settings.json
        run: python -c "import json; json.load(open('.claude/settings.json')); print('settings.json OK')"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

      # Eval-suite gate (operator rule: prompt changes must pass evals before merge).
      # Wired to activate once evaluations/ is populated in Phase 4.
      - name: Eval suite (if present)
        run: |
          if ls evaluations/test_*.py >/dev/null 2>&1; then pytest evaluations -q; else echo "no evals yet - skipping"; fi
