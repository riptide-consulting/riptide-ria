# logging configuration
[loggers]
keys=root,ria

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=detailed

[logger_root]
level=INFO
handlers=consoleHandler

[logger_ria]
level=INFO
handlers=consoleHandler,fileHandler
qualname=ria
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=detailed
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=detailed
# %(logpath)s is interpolated from ria/logging_setup.py's defaults= (absolute, from
# LOG_PATH in .env, anchored to the project root). Explicit utf-8 keeps a document title
# with a non-cp1252 character from raising UnicodeEncodeError inside the logger on Windows.
args=('%(logpath)s', 'a', 'utf-8')

[formatter_detailed]
format=%(asctime)s | %(name)s | %(levelname)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
